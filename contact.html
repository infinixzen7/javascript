<style>

}

/* HEADER */

header{

}

}

/* FORM */

.container{
width:90%;
max-width:700px;

padding:35px;
border-radius:15px;
}

input,textarea{

}

/* INFO */

margin-top:30px;

}

nav a.active{
    color:#fff;
    background:linear-gradient(135deg,#3b82f6,#7c3aed);
    padding:10px 18px;
    border-radius:8px;
    font-weight:600;
    box-shadow:0 0 15px rgba(59,130,246,.5);
}

/* FOOTER */

footer{
margin-top:40px;
text-align:center;
padding:20px;
background:#020617;
color:#94a3b8;
}

</style>

</head>

<body>

<nav>
<div class="logo">JS<span>Academy</span></div>
<ul>

</ul>
</nav>

<header>
<h1>Contact Us</h1>
<p>Send us a message — we reply within 24 hours</p>
</header>

<div class="container">

<input type="text" id="name" placeholder="Your Name *" required>
<input type="email" id="email" placeholder="Your Email *" required>
<input type="text" id="subject" placeholder="Subject">
<textarea id="message" placeholder="Your Message"></textarea>

<button onclick="sendEmail()">Send Message</button>

<div class="msg" id="msg"></div>

</div>

<div class="info">
<p>📧 support@jsacademy.com</p>
<p>📞 +91-XXXXXXXXXX</p>
</div>

<footer>
© 2026 JSAcademy | All Rights Reserved
</footer>

<script>

// INIT EMAILJS (replace with your ID later)
(function(){
emailjs.init("YOUR_PUBLIC_KEY"); // <-- replace this
})();

function sendEmail(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let subject = document.getElementById("subject").value;
let message = document.getElementById("message").value;

let msgBox = document.getElementById("msg");

// Validation
if(name === "" || email === ""){
msgBox.style.color = "red";
msgBox.innerHTML = "Name and Email are required!";
return;
}

let params = {
from_name: name,
from_email: email,
subject: subject,
message: message
};

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",params)
.then(function(response){
msgBox.style.color = "lightgreen";
msgBox.innerHTML = "Message sent successfully!";
})
.catch(function(error){
msgBox.style.color = "red";
msgBox.innerHTML = "Failed to send message!";
});

}

</script>

</body>
