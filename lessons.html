<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Lessons | JSAcademy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#111827;
box-shadow:0 5px 20px rgba(0,0,0,.3);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:700;
color:#38bdf8;
}

.logo span{
color:#facc15;
}

nav ul{
display:flex;
list-style:none;
gap:28px;
}

nav ul li a{
color:white;
text-decoration:none;
transition:.3s;
font-weight:500;
}

nav ul li a:hover,
.active{
color:#38bdf8;
}

/* HEADER */

header{
padding-top:120px;
padding-bottom:50px;
text-align:center;
background:linear-gradient(135deg,#1e293b,#0f172a);
}

header h1{
font-size:48px;
margin-bottom:15px;
}

header p{
color:#cbd5e1;
font-size:18px;
}

/* SEARCH */

.search{
display:flex;
justify-content:center;
margin:40px;
}

.search input{

width:500px;
max-width:90%;
padding:15px 20px;
border:none;
border-radius:50px;
font-size:16px;
outline:none;
}

/* ROADMAP */

.container{
width:90%;
max-width:1200px;
margin:auto;
padding-bottom:70px;
}

.section-title{
font-size:34px;
margin-bottom:30px;
}

.lesson-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;

}

.lesson-card{

background:#1e293b;
padding:25px;
border-radius:18px;
transition:.35s;
border:1px solid transparent;

}

.lesson-card:hover{

transform:translateY(-8px);
border-color:#38bdf8;
box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.lesson-number{

width:55px;
height:55px;
background:#38bdf8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
margin-bottom:20px;

}

.lesson-card h3{
margin-bottom:15px;
}

.lesson-card p{

color:#cbd5e1;
line-height:1.7;
margin-bottom:20px;

}

.tag{

display:inline-block;
padding:6px 14px;
border-radius:20px;
font-size:13px;
margin-right:8px;
margin-bottom:15px;

}

.beginner{
background:#16a34a;
}

.intermediate{
background:#ea580c;
}

.advanced{
background:#dc2626;
}

.btn{

display:inline-block;
margin-top:10px;
padding:12px 22px;
background:#38bdf8;
text-decoration:none;
color:white;
border-radius:30px;
transition:.3s;

}

.btn:hover{
background:#0284c7;
}

/* PROGRESS */

.progress{

margin:70px auto;
background:#1e293b;
padding:30px;
border-radius:20px;

}

.progress h2{
margin-bottom:20px;
}

.bar{

height:18px;
background:#334155;
border-radius:50px;
overflow:hidden;
margin-bottom:15px;

}

.fill{

width:0%;
height:100%;
background:linear-gradient(to right,#06b6d4,#38bdf8);

}

nav a.active{
    color:#fff;
    background:linear-gradient(135deg,#3b82f6,#7c3aed);
    padding:10px 18px;
    border-radius:8px;
    font-weight:600;
    box-shadow:0 0 15px rgba(59,130,246,.5);
}

footer{

background:#020617;
padding:20px;
text-align:center;
color:#94a3b8;
margin-top:60px;

}

@media(max-width:768px){

nav{

flex-direction:column;
padding:15px;

}

nav ul{

margin-top:15px;
flex-wrap:wrap;
justify-content:center;

}

header h1{
font-size:36px;
}

}

</style>
</head>
<body>

<nav>

<div class="logo">JS<span>Academy</span></div>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="progress.html">Progress</a></li>
<li><a href="lessons.html" class="active">Lessons</a></li>
<li><a href="quiz.html">Quiz</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

<header>

<h1>JavaScript Learning Roadmap</h1>

<p>Complete each lesson in order and become a professional JavaScript developer.</p>

</header>

<div class="search">

<input type="text" placeholder="🔍 Search lessons...">

</div>

<div class="container">

<div class="progress">

<h2>Your Progress</h2>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<p id="progressText"></p>

</div>

<h2 class="section-title">Course Lessons</h2>

<div class="lesson-grid" id="lessonGrid"></div>

</div>

<footer>

© 2026 JSAcademy • Learn JavaScript Professionally

</footer>
<script>

const completed = Number(localStorage.getItem("lessonsCompleted")) || 0;

const percent = (completed/15)*100;

document.getElementById("fill").style.width = percent + "%";

document.getElementById("progressText").innerHTML =
`Completed <strong>${completed} of 15</strong> lessons`;

if(localStorage.getItem("lesson1Completed")=="true"){

    const btn=document.getElementById("lesson1Btn");

    btn.innerHTML="✔ Completed";

    btn.style.background="#16a34a";

}

</script>

<script>

const lessons=[
["Introduction to JavaScript","Understand JavaScript, where it runs, and why it powers modern websites.","Beginner","lesson1.html"],
["Variables","Learn var, let and const.","Beginner","lesson2.html"],
["Data Types","Learn JavaScript data types.","Beginner","lesson3.html"],
["Operators","Arithmetic, logical and comparison operators.","Beginner","lesson4.html"],
["Conditions","if, else and switch.","Beginner","lesson5.html"],
["Loops","for, while and do...while.","Beginner","lesson6.html"],
["Functions","Functions and arrow functions.","Intermediate","lesson7.html"],
["Arrays","Arrays and array methods.","Intermediate","lesson8.html"],
["Objects","Objects and destructuring.","Intermediate","lesson9.html"],
["DOM","DOM Manipulation.","Intermediate","lesson10.html"],
["Events","JavaScript Events.","Intermediate","lesson11.html"],
["ES6","Modern JavaScript.","Advanced","lesson12.html"],
["Promises","Promises.","Advanced","lesson13.html"],
["Async / Await","Async Programming.","Advanced","lesson14.html"],
["API & Projects","Fetch API and Projects.","Advanced","lesson15.html"]
];

const grid=document.getElementById("lessonGrid");

lessons.forEach((lesson,index)=>{

const no=index+1;

const completed=localStorage.getItem(`lesson${no}Completed`)==="true";

let button="";

if(completed){

button=`<a href="${lesson[3]}" class="btn" style="background:#16a34a;">✔ Review Lesson</a>`;

}else{

button=`<a href="${lesson[3]}" class="btn">Start Lesson</a>`;

}

grid.innerHTML+=`

<div class="lesson-card">

<div class="lesson-number">${no}</div>

<span class="tag ${lesson[2].toLowerCase()}">${lesson[2]}</span>

<h3>${lesson[0]}</h3>

<p>${lesson[1]}</p>

${button}

</div>

`;

});

</script>
</body>
</html>
